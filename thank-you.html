<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OpenAisle — You're on the list</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,500&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root {
  --saffron: #DE7A2C; --saffron-deep: #C2611B; --saffron-soft: #F0A463; --saffron-tint: #FBE9D6;
  --claret: #7E2741; --claret-tint: #F3DCE1;
  --sage: #71805C; --sage-tint: #E7EBDD;
  --ink: #251C1A; --ink-2: #5B514B; --ink-3: #8B817A;
  --ivory: #FBF5EC; --paper: #FFFDF8; --border: #E8DECF;
  --positive: #5C7048; --positive-tint: #E7EBDD;
  --shadow-md: 0 2px 4px rgba(58,40,22,.05), 0 8px 20px rgba(58,40,22,.09);
  --r-lg: 20px; --r-pill: 999px;
  --font-display: 'Cormorant Garamond', Georgia, serif;
  --font-sans: 'Hanken Grotesk', system-ui, sans-serif;
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--ivory); color: var(--ink); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; flex-direction: column; }
a { color: inherit; text-decoration: none; }

.topbar { max-width: 1120px; margin: 0 auto; padding: 28px 28px 0; width: 100%; }
.logo { display: flex; align-items: center; gap: 10px; }
.logo svg { width: 32px; height: 32px; color: var(--saffron-deep); }
.logo span { font-family: var(--font-display); font-weight: 600; font-size: 25px; color: var(--ink); }
.logo span b { color: var(--saffron-deep); font-weight: 600; }

.main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px 28px; }
.card {
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-md);
  padding: 52px 48px;
  max-width: 540px;
  width: 100%;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--saffron), var(--claret));
}
.icon {
  width: 80px; height: 80px;
  border-radius: 999px;
  background: var(--positive-tint);
  color: var(--positive);
  display: grid; place-items: center;
  margin: 0 auto 28px;
}
.icon svg { width: 36px; height: 36px; stroke-width: 2; }
.eyebrow {
  font-size: 12px; font-weight: 600; letter-spacing: .18em;
  text-transform: uppercase; color: var(--saffron-deep);
  display: block; margin-bottom: 14px;
}
h1 {
  font-family: var(--font-display);
  font-weight: 600; font-size: 42px; line-height: 1.05;
  color: var(--ink); margin-bottom: 16px;
}
h1 i { font-style: italic; color: var(--claret); }
p { font-size: 16px; line-height: 1.65; color: var(--ink-2); margin-bottom: 32px; }

.divider { width: 48px; height: 1px; background: var(--border); margin: 0 auto 28px; }

.back-link {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--saffron); color: #fff;
  font-size: 15px; font-weight: 600;
  padding: 12px 24px; border-radius: var(--r-pill);
  transition: background .18s var(--ease), transform .18s var(--ease);
}
.back-link:hover { background: var(--saffron-deep); transform: translateY(-1px); }
.back-link svg { width: 16px; height: 16px; stroke-width: 2; }

@media (prefers-reduced-motion: no-preference) {
  .card { animation: rise .6s var(--ease) forwards; }
  @keyframes rise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
}
@media (max-width: 560px) {
  .card { padding: 36px 24px; }
  h1 { font-size: 34px; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <svg viewBox="0 0 48 48" fill="none">
      <path d="M9 43 L9 22 A15 15 0 0 1 39 22 L39 43" stroke="currentColor" stroke-width="3.4" stroke-linecap="round"/>
      <path d="M17 43 L17 24 A7 7 0 0 1 31 24 L31 43" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
    </svg>
    <span>Open<b>Aisle</b></span>
  </div>
</div>

<main class="main">
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <span class="eyebrow">Submission received</span>
    <h1>You're on the <i>list</i></h1>
    <p>We'll be in touch before we launch to help you build your listing. Thank you for opening your aisle to the world.</p>
    <div class="divider"></div>
    <a href="/" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Back to OpenAisle
    </a>
  </div>
</main>

</body>
</html>
