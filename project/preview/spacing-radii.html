<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="card.css">
<style>
  .grid { display:flex; gap:14px; align-items:flex-end; }
  .b { background:var(--paper); border:1px solid var(--border-strong); }
  .cap { text-align:center; margin-top:8px; }
  .cap .n { font-weight:700; font-size:13px; }
  .cap .v { font-family:var(--font-mono); font-size:11px; color:var(--ink-3); }
</style></head>
<body><div class="card">
  <div class="grid">
    <div><div class="b" style="width:74px; height:74px; border-radius:6px;"></div><div class="cap"><div class="n">xs</div><div class="v">6px</div></div></div>
    <div><div class="b" style="width:74px; height:74px; border-radius:10px;"></div><div class="cap"><div class="n">sm</div><div class="v">10px</div></div></div>
    <div><div class="b" style="width:74px; height:74px; border-radius:14px;"></div><div class="cap"><div class="n">md</div><div class="v">14px · inputs</div></div></div>
    <div><div class="b" style="width:74px; height:74px; border-radius:20px;"></div><div class="cap"><div class="n">lg</div><div class="v">20px · cards</div></div></div>
    <div><div class="b" style="width:74px; height:74px; border-radius:28px;"></div><div class="cap"><div class="n">xl</div><div class="v">28px · panels</div></div></div>
    <div><div class="b" style="width:74px; height:42px; border-radius:999px;"></div><div class="cap"><div class="n">pill</div><div class="v">btns · chips</div></div></div>
  </div>
</div></body></html>
