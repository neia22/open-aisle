<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="card.css">
<style>
  .scale { display:flex; gap:10px; align-items:flex-end; }
  .u { background:var(--saffron-tint); border:1px solid var(--saffron-soft); border-radius:4px; }
  .u i { display:block; text-align:center; font-family:var(--font-mono); font-size:10px; color:var(--saffron-deep); margin-top:6px; font-style:normal; }
</style></head>
<body><div class="card" style="gap:18px;">
  <div>
    <div class="lbl" style="margin-bottom:12px;">Spacing scale · 4px base</div>
    <div class="scale">
      <div><div class="u" style="width:4px; height:4px;"></div><i>1</i></div>
      <div><div class="u" style="width:8px; height:8px;"></div><i>2</i></div>
      <div><div class="u" style="width:12px; height:12px;"></div><i>3</i></div>
      <div><div class="u" style="width:16px; height:16px;"></div><i>4</i></div>
      <div><div class="u" style="width:20px; height:20px;"></div><i>5</i></div>
      <div><div class="u" style="width:24px; height:24px;"></div><i>6</i></div>
      <div><div class="u" style="width:32px; height:32px;"></div><i>8</i></div>
      <div><div class="u" style="width:40px; height:40px;"></div><i>10</i></div>
      <div><div class="u" style="width:48px; height:48px;"></div><i>12</i></div>
      <div><div class="u" style="width:64px; height:64px;"></div><i>16</i></div>
    </div>
  </div>
  <div class="tok">--s-1 … --s-24 · use for padding, gaps, and rhythm. Content column maxes at 1200px.</div>
</div></body></html>
