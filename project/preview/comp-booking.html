<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="card.css">
<style>
  .summary { width:340px; background:var(--paper); border:1px solid var(--border); border-radius:18px; box-shadow:var(--shadow-md); padding:18px 20px; }
  .summary h4 { font-family:var(--font-display); font-weight:600; font-size:21px; margin:0 0 14px; color:var(--ink); }
  .ln { display:flex; justify-content:space-between; align-items:center; font-size:14px; color:var(--ink-2); padding:7px 0; }
  .ln b { font-family:var(--font-mono); font-weight:500; color:var(--ink); }
  .ln.tot { border-top:1px solid var(--border); margin-top:6px; padding-top:13px; }
  .ln.tot span { font-weight:700; color:var(--ink); font-size:15px; }
  .ln.tot b { font-family:var(--font-display); font-size:24px; font-weight:600; }
  .btn { width:100%; margin-top:14px; background:var(--saffron); color:#fff; border:none; border-radius:999px; padding:13px; font-family:var(--font-sans); font-weight:600; font-size:15px; box-shadow:var(--shadow-sm); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; }
  .btn svg { width:17px; height:17px; }
  .note { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--ink-3); margin-top:11px; justify-content:center; }
  .note svg { width:13px; height:13px; }
</style></head>
<body><div class="card" style="align-items:center;">
  <div class="summary">
    <h4>Your seats</h4>
    <div class="ln"><span>$180 × 2 seats</span><b>$360</b></div>
    <div class="ln"><span>Feast &amp; welcome gift</span><b>Included</b></div>
    <div class="ln"><span>OpenAisle service</span><b>$28</b></div>
    <div class="ln tot"><span>Total</span><b>$388</b></div>
    <button class="btn">Confirm &amp; reserve <i data-lucide="arrow-right"></i></button>
    <div class="note"><i data-lucide="shield-check"></i> Free to cancel up to 14 days before</div>
  </div>
</div>
<script src="https://unpkg.com/lucide@latest"></script><script>lucide.createIcons();</script>
</body></html>
