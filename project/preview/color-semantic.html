<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="card.css">
<style>
  .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  .item { border-radius:12px; padding:12px; border:1px solid var(--border); background:var(--paper); }
  .dot { width:24px; height:24px; border-radius:999px; margin-bottom:10px; }
  .item .nm { font-weight:700; font-size:14px; }
  .item .hx { font-family:var(--font-mono); font-size:11px; color:var(--ink-3); }
  .pill { display:inline-flex; align-items:center; gap:6px; padding:5px 11px; border-radius:999px; font-size:12px; font-weight:600; margin-top:9px; }
</style></head>
<body><div class="card">
  <div class="grid">
    <div class="item"><div class="dot" style="background:var(--positive)"></div><div class="nm">Positive</div><div class="hx">#5C7048</div><span class="pill" style="background:var(--positive-tint); color:var(--positive)">Seats available</span></div>
    <div class="item"><div class="dot" style="background:var(--warning)"></div><div class="nm">Warning</div><div class="hx">#C2611B</div><span class="pill" style="background:var(--warning-tint); color:var(--warning)">3 seats left</span></div>
    <div class="item"><div class="dot" style="background:var(--danger)"></div><div class="nm">Danger</div><div class="hx">#B23A2E</div><span class="pill" style="background:var(--danger-tint); color:var(--danger)">Sold out</span></div>
    <div class="item"><div class="dot" style="background:var(--info)"></div><div class="nm">Info</div><div class="hx">#4A6C7A</div><span class="pill" style="background:var(--info-tint); color:var(--info)">Pending</span></div>
  </div>
</div></body></html>
