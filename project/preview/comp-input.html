<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="card.css">
<style>
  .field { display:flex; flex-direction:column; gap:7px; flex:1; }
  label { font-weight:600; font-size:13px; color:var(--ink); }
  .inp { display:flex; align-items:center; gap:9px; background:var(--paper); border:1px solid var(--border-strong); border-radius:14px; padding:12px 14px; }
  .inp svg { width:17px; height:17px; color:var(--ink-3); }
  .inp input { border:none; background:none; outline:none; font-family:var(--font-sans); font-size:15px; color:var(--ink); width:100%; }
  .inp.focus { border-color:var(--saffron); box-shadow:0 0 0 3px var(--saffron-soft); }
  .inp.focus svg { color:var(--saffron-deep); }
  .help { font-size:12px; color:var(--ink-3); }
</style></head>
<body><div class="card">
  <div class="row" style="gap:18px; align-items:flex-start;">
    <div class="field">
      <label>Where to?</label>
      <div class="inp focus"><i data-lucide="search"></i><input value="Tamil ceremonies" /></div>
      <span class="help">City, country, or tradition · focused</span>
    </div>
    <div class="field">
      <label>When</label>
      <div class="inp"><i data-lucide="calendar"></i><input placeholder="Add dates" /></div>
      <span class="help">Default state</span>
    </div>
  </div>
</div>
<script src="https://unpkg.com/lucide@latest"></script><script>lucide.createIcons();</script>
</body></html>
